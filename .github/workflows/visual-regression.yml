name: Windows visual regression

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "tests/visual/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main, test]
    paths:
      - "src/**"
      - "public/**"
      - "tests/visual/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:visual
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: windows-visual-diff
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
